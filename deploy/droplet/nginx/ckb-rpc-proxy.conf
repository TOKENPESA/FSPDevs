# Public CKB JSON-RPC façade for sidelocals / Fiber Agent L1 verification.
# Treasury does not run a full CKB node; proxy to the same testnet endpoint Hub FNN uses.
upstream ckb_testnet_rpc {
    server testnet.ckbapp.dev:443;
}

server {
    listen 8114;
    listen [::]:8114;
    server_name _;

    client_max_body_size 8m;

    location / {
        proxy_pass https://ckb_testnet_rpc/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name testnet.ckbapp.dev;
        proxy_set_header Host testnet.ckbapp.dev;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Content-Type $content_type;
        proxy_read_timeout 120s;
        proxy_connect_timeout 15s;
    }
}

# Indexer-compatible surface (same public RPC; Fiber tooling often expects :8116).
server {
    listen 8116;
    listen [::]:8116;
    server_name _;

    client_max_body_size 8m;

    location / {
        proxy_pass https://ckb_testnet_rpc/;
        proxy_http_version 1.1;
