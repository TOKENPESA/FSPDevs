map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80 default_server;
    server_name _;
    client_max_body_size 64k;

    location /mfa-console/ {
        alias /opt/fspdevs/mfa-console/;
        try_files $uri $uri/ /mfa-console/index.html;
    }

    # ES module imports from mfa-console (../../dashboard, ../../packages)
    location /dashboard/ {
        alias /opt/fspdevs/dashboard/;
        add_header Cache-Control "no-cache";
        types { application/javascript js; text/css css; }
        default_type application/javascript;
    }

    location /packages/ {
        alias /opt/fspdevs/packages/;
        add_header Cache-Control "no-cache";
        types { application/javascript js; text/css css; }
        default_type application/javascript;
    }

    location / {
        proxy_pass http://127.0.0.1:1025;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
    }
}
