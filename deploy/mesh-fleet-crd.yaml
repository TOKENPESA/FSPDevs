apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: meshfleets.fspdevs.infra
spec:
  group: fspdevs.infra
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: ["replicas", "agent_image", "fnn_image", "mfa_target_url", "base_rpc_port"]
              properties:
                replicas:
                  type: integer
                  minimum: 1
                  maximum: 1024
                agent_image:
                  type: string
                fnn_image:
                  type: string
                mfa_target_url:
                  type: string
                base_rpc_port:
                  type: integer
            status:
              type: object
              properties:
                current_replicas:
                  type: integer
                fully_armed_nodes:
                  type: integer
                active_port_range:
                  type: string
                sync_complete:
                  type: boolean
      subresources:
        status: {}
  scope: Namespaced
  names:
    plural: meshfleets
    singular: meshfleet
    kind: MeshFleet
    shortNames: ["mf"]
