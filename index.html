<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FiberAgent — Mesh Simulation Visualizer</title>
  <style>
    :root {
      --bg: #0a0e17; --panel: #121a2b; --border: #1f2d4d; --text: #e8eefc;
      --muted: #8ba3cc; --accent: #3d8bfd; --ok: #2ecc71; --warn: #f39c12;
      --danger: #e74c3c; --heal: #00d4ff;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Segoe UI", system-ui, sans-serif;
      background: radial-gradient(ellipse at top, #101a30 0%, var(--bg) 55%);
      color: var(--text); min-height: 100vh; }
    header { padding: 1rem 1.5rem; border-bottom: 1px solid var(--border);
      display: flex; flex-wrap: wrap; align-items: center; gap: 1rem; justify-content: space-between; }
    header h1 { margin: 0; font-size: 1.15rem; }
    header p { margin: 0.25rem 0 0; color: var(--muted); font-size: 0.85rem; }
    .status { display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--danger); }
    .dot.connected { background: var(--ok); }
    main { display: grid; grid-template-columns: 280px 1fr; gap: 1rem;
      padding: 1rem 1.5rem 1.5rem; min-height: calc(100vh - 80px); }
    @media (max-width: 900px) { main { grid-template-columns: 1fr; } }
    .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 1rem; }
    .panel h2 { margin: 0 0 0.75rem; font-size: 0.75rem; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--muted); }
    label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 0.25rem; }
    input[type="text"], input[type="number"], input[type="range"] { width: 100%; }
    input[type="text"], input[type="number"] { background: #0d1424; border: 1px solid var(--border); color: var(--text);
      padding: 0.45rem 0.6rem; border-radius: 6px; margin-bottom: 0.75rem;
      font-family: ui-monospace, monospace; font-size: 0.8rem; }
    .controls { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.75rem; }
    button { background: #1a2744; border: 1px solid var(--border); color: var(--text);
      padding: 0.45rem 0.75rem; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
    button:hover { border-color: var(--accent); }
    button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-top: 0.75rem; }
    .metric { background: #0d1424; border-radius: 6px; padding: 0.5rem 0.6rem; }
    .metric span { display: block; font-size: 0.7rem; color: var(--muted); }
    .metric strong { font-size: 1.1rem; font-variant-numeric: tabular-nums; }
    #event-log { margin: 0; padding: 0; list-style: none; max-height: 220px; overflow-y: auto;
      font-family: ui-monospace, monospace; font-size: 0.72rem; line-height: 1.45; }
    #event-log li { padding: 0.25rem 0; border-bottom: 1px solid rgba(255,255,255,0.04); color: var(--muted); }
    #event-log li.heal { color: var(--heal); }
    #event-log li.warn { color: var(--warn); }
    #event-log li.dead { color: var(--danger); }
    .canvas-wrap { position: relative; background: #060a12; border: 1px solid var(--border);
      border-radius: 10px; overflow: hidden; min-height: 520px; }
    canvas { display: block; width: 100%; height: auto; cursor: crosshair; }
    .hint { position: absolute; bottom: 0.75rem; left: 0.75rem; font-size: 0.75rem;
      color: var(--muted); pointer-events: none; }
    #fa-tooltip {
      position: absolute;
      display: none;
      pointer-events: none;
      z-index: 10;
      min-width: 168px;
      padding: 0.55rem 0.7rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(8, 14, 28, 0.94);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.45);
      font-family: ui-monospace, monospace;
      font-size: 0.72rem;
      line-height: 1.5;
    }
    #fa-tooltip.visible { display: block; }
    #fa-tooltip .fa-id { font-size: 0.85rem; font-weight: 600; margin-bottom: 0.25rem; }
    #fa-tooltip .fa-status { font-weight: 600; margin-bottom: 0.35rem; }
    #fa-tooltip .fa-status.active { color: var(--ok); }
    #fa-tooltip .fa-status.offline { color: var(--danger); }
    #fa-tooltip .fa-status.healed { color: var(--heal); }
    #fa-tooltip .fa-row { color: var(--muted); }
    #fa-tooltip .fa-row span { color: var(--text); }
    .links { margin-top: 0.75rem; font-size: 0.8rem; }
    .links a { color: var(--accent); }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>FiberAgent Mesh Visualizer</h1>
      <p>1024-node lattice mesh (32×32 grid) · live MFA stream</p>
    </div>
    <div class="status">
      <span class="dot" id="conn-dot"></span>
      <span id="conn-status">Disconnected</span>
    </div>
  </header>
  <main>
    <aside class="panel">
      <h2>Control Deck</h2>
      <label for="mfa-ws">MFA monitor WebSocket</label>
      <input id="mfa-ws" type="text" value="ws://127.0.0.1:1025/ws/monitor" />
      <div class="controls">
        <button class="primary" id="btn-connect">Connect</button>
        <button id="btn-play">Play</button>
        <button id="btn-pause">Pause</button>
      </div>
      <label for="speed">Animation speed: <span id="speed-label">1×</span></label>
      <input id="speed" type="range" min="0.25" max="4" step="0.25" value="1" />
      <div class="metrics">
        <div class="metric"><span>Tick</span><strong id="metric-tick">0</strong></div>
        <div class="metric"><span>Offline</span><strong id="metric-dead">0</strong></div>
        <div class="metric"><span>Heals</span><strong id="metric-heals">0</strong></div>
        <div class="metric"><span>Hover</span><strong id="metric-hover">—</strong></div>
      </div>
      <div class="links">
        <a href="http://localhost:8787/demo/" target="_blank" rel="noopener">Wasm agent demo →</a>
      </div>

      <h2 style="margin-top:1rem">Transaction Simulator</h2>
      <label for="route-source">Source Node (FA 1–1024)</label>
      <input id="route-source" type="number" min="1" max="1024" value="1" />
      <label for="route-dest">Destination Node (FA 1–1024)</label>
      <input id="route-dest" type="number" min="1" max="1024" value="512" />
      <label for="route-amount">Amount (Shannons)</label>
      <input id="route-amount" type="number" min="1" value="1000000" />
      <div class="controls">
        <button class="primary" id="btn-route" type="button">Route Transaction</button>
      </div>
      <div class="metric" style="margin-bottom:0.75rem">
        <span>Active route</span>
        <strong id="metric-route" style="font-size:0.75rem;font-weight:500">—</strong>
      </div>

      <h2 style="margin-top:1rem">Event Log</h2>
      <ul id="event-log"></ul>
    </aside>
    <section class="canvas-wrap panel" style="padding:0">
      <canvas id="grid" width="960" height="640"></canvas>
      <div id="fa-tooltip" aria-hidden="true"></div>
      <div class="hint">Click a node to toggle offline · hover for FA status</div>
    </section>
  </main>
  <script type="module" src="./dashboard.js"></script>
</body>
</html>
