<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Master Fiber Agent — Operations Console</title>
  <base href="/mfa-console/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/mfa-console/styles/console.css">
  <link rel="stylesheet" href="/mfa-console/styles/mfa-extensions.css">
</head>
<body class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-mark">MFA</div>
      <div class="brand-copy">
        <div class="brand-title">Supervisor Console</div>
        <div class="brand-subtitle" id="brand-subtitle">127.0.0.1:1025</div>
      </div>
    </div>

    <div class="sidebar-search">
      <span class="search-icon" aria-hidden="true"></span>
      <input type="search" id="nav-search" placeholder="Search routes…" aria-label="Search navigation">
    </div>

    <nav class="sidebar-nav" id="sidebar-nav" aria-label="MFA modules"></nav>
  </aside>

  <div class="sidebar-backdrop" id="sidebar-backdrop" hidden></div>

  <div class="app-main">
    <header class="topbar">
      <div class="topbar-left">
        <button type="button" class="icon-btn icon-btn-ghost" id="sidebar-toggle" aria-label="Toggle sidebar">
          <span class="ui-icon ui-icon-menu" aria-hidden="true"></span>
        </button>
        <div class="topbar-title">Master Fiber Agent</div>
      </div>
      <div class="topbar-right">
        <span class="conn-pill" id="conn-pill" title="Monitor WebSocket">
          <span class="conn-dot" id="conn-dot"></span>
          <span id="conn-status">Offline</span>
        </span>
        <button type="button" class="icon-btn icon-btn-ghost" aria-label="Notifications">
          <span class="ui-icon ui-icon-bell" aria-hidden="true"></span>
        </button>
        <div class="user-chip">
          <div class="user-avatar">MFA</div>
          <div class="user-copy">
            <div class="user-name">Supervisor</div>
          </div>
        </div>
        <div class="topbar-status">
          <time class="clock-badge" id="clock-badge" title="Current time">--</time>
          <time class="last-sync-badge" id="last-sync-badge" title="Last MFA sync">Last sync · pending</time>
        </div>
      </div>
    </header>

    <main class="content-area" id="main-content" aria-live="polite"></main>
  </div>

  <div id="mfa-dashboard-bridge" hidden aria-hidden="true">
    <span id="mesh-subtitle"></span>
    <span id="size-label"></span>
    <span id="grid-dim-label"></span>
    <span id="fleet-hint"></span>
    <span id="metric-tick">0</span>
    <span id="metric-live">0</span>
    <span id="metric-dead">0</span>
    <span id="metric-heals">0</span>
    <span id="metric-hover">—</span>
    <span id="metric-route">—</span>
    <span id="speed-label">1×</span>
    <input id="network-size" type="range" value="1024">
    <input id="edge-node-count" type="number" value="1024">
    <input id="route-source" type="number" value="1">
    <input id="route-dest" type="number" value="512">
    <input id="route-amount" type="number" value="1000000">
    <input id="speed" type="range" value="1">
    <input id="mfa-ws" type="text" value="ws://127.0.0.1:1025/ws/monitor">
    <span id="route-max-label">1024</span>
    <span id="route-max-label-2">1024</span>
    <span id="hub-rpc">—</span>
    <span id="hub-funding">—</span>
    <span id="hub-alerts">—</span>
    <span id="hub-last-event">—</span>
    <span id="metric-liquidity-ok">0</span>
    <span id="metric-liquidity-faucet">0</span>
    <span id="metric-liquidity-flight">0</span>
    <span id="metric-liquidity-fail">0</span>
    <canvas id="grid" width="960" height="520" style="position:fixed;left:-10000px;top:0"></canvas>
    <ul id="event-log"></ul>
    <button id="btn-connect" type="button"></button>
    <button id="btn-play" type="button"></button>
    <button id="btn-pause" type="button"></button>
    <div id="edge-presets"></div>
    <div id="fa-tooltip"></div>
  </div>

  <script type="module" src="/mfa-console/js/app.js"></script>
  <script type="module" src="/mfa-console/js/shell-icons.js"></script>
</body>
</html>
